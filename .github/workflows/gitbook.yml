name: Build and Deploy GitBook

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Escape nunjucks syntax in code blocks
        run: python3 scripts/escape_nunjucks.py .

      - name: Install HonKit and plugins
        run: |
          npm install honkit gitbook-plugin-search-pro gitbook-plugin-fontsettings gitbook-plugin-theme-default gitbook-plugin-highlight

      - name: Build GitBook
        run: npx honkit build . ./docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
