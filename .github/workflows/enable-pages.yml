name: Enable GitHub Pages

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages with Actions source
        run: |
          # Try to create Pages site with workflow/actions source
          echo "Attempting to enable GitHub Pages..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "GitHub Pages enabled successfully!"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "GitHub Pages is already enabled."
          else
            echo "Failed to enable Pages. Status: $HTTP_CODE"
            exit 1
          fi
